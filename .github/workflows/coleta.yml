name: Coleta Diária de Preços de Banana
on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  collect_prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install mysql-connector-python requests beautifulsoup4
      
      - name: Listar arquivos para debug
        run: find . -name "scrape_prices_prohort_diario.py" -type f
      
      - name: Executar script de coleta
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          if [ -f "./scripts/scrape_prices_prohort_diario.py" ]; then
            python ./scripts/scrape_prices_prohort_diario.py
          elif [ -f "scripts/scrape_prices_prohort_diario.py" ]; then
            python scripts/scrape_prices_prohort_diario.py
          else
            echo "Arquivo não encontrado!"
            find . -name "*.py" -type f
            exit 1
          fi
      
      - name: Registrar sucesso
        if: success()
        run: echo "Coleta de preços concluída com sucesso"
      
      - name: Registrar erro
        if: failure()
        run: echo "Erro na coleta de preços"
